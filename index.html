<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="指尖随机">
    <meta name="theme-color" content="#000000">
    <meta name="background-color" content="#000000">
    <meta name="description" content="多人同时触摸屏幕，光环转满后随机选择一人">

    <title>指尖随机</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* 安装提示弹窗 */
        .install-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .install-modal.show {
            opacity: 1;
            pointer-events: all;
        }

        .install-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 28px 24px;
            max-width: 340px;
            width: 100%;
            text-align: center;
            border: 1px solid #333;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .install-modal.show .install-card {
            transform: translateY(0);
        }

        .install-card .icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .install-card h2 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .install-card p {
            color: #999;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .install-card .steps {
            text-align: left;
            background: #111;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .install-card .steps ol {
            color: #ccc;
            font-size: 13px;
            line-height: 2;
            padding-left: 20px;
        }

        .install-card .steps li {
            margin-bottom: 4px;
        }

        .install-card .steps .highlight {
            color: #FFD700;
            font-weight: 500;
        }

        .install-btn {
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            color: #000;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .install-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }

        .install-btn:active {
            transform: scale(0.98);
        }

        .skip-btn {
            background: transparent;
            color: #666;
            border: none;
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
        }

        .skip-btn:hover {
            color: #999;
        }

        /* Chrome 安装按钮 */
        .chrome-install-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            font-size: 16px;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.5s;
            letter-spacing: 2px;
            line-height: 1.8;
        }

        .hint.hidden {
            opacity: 0;
        }

        .finger {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .finger.ready {
            box-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
        }

        .finger.winner {
            animation: winnerPulse 1.8s ease-in-out infinite;
            z-index: 100;
        }

        @keyframes winnerPulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1); 
                filter: brightness(1);
            }
            25% { 
                transform: translate(-50%, -50%) scale(1.5); 
                filter: brightness(1.3);
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.2); 
                filter: brightness(1.1);
            }
            75% { 
                transform: translate(-50%, -50%) scale(1.6); 
                filter: brightness(1.4);
            }
        }

        .ring {
            position: absolute;
            width: 80px;
            height: 80px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .ring svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .ring circle {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 251;
            stroke-dashoffset: 251;
            transition: stroke-dashoffset 0.1s linear;
        }

        .ring.ready circle {
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.3s;
        }

        .roulette-glow {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
        }

        .roulette-glow.active {
            opacity: 1;
            animation: roulettePop 0.12s ease-out;
        }

        @keyframes roulettePop {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
        }

        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFly 1s ease-out forwards;
        }

        @keyframes particleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .status-toast {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .status-toast.show {
            opacity: 1;
        }

        .finger.fade {
            opacity: 0 !important;
            transform: translate(-50%, -50%) scale(0.2) !important;
            transition: all 0.5s ease;
        }

        .ring.fade {
            opacity: 0 !important;
            transition: opacity 0.5s ease;
        }

        .winner-aura {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 99;
            animation: auraPulse 2s ease-in-out infinite;
        }

        @keyframes auraPulse {
            0%, 100% { 
                width: 120px; 
                height: 120px; 
                opacity: 0.3;
            }
            50% { 
                width: 200px; 
                height: 200px; 
                opacity: 0.1;
            }
        }

        /* 安装提示角标 */
        .install-badge {
            position: fixed;
            top: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            z-index: 9998;
            animation: badgePulse 2s ease-in-out infinite;
            backdrop-filter: blur(10px);
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .install-badge:hover {
            background: rgba(255, 215, 0, 0.25);
        }
    </style>
</head>
<body>

    <div class="hint" id="hint">将拇指放在屏幕上<br>光环转满即确认</div>
    <div class="status-toast" id="toast"></div>

    <!-- 安装提示角标 -->
    <div class="install-badge" id="installBadge" style="display:none;">📲</div>

    <!-- Chrome 安装按钮 -->
    <button class="chrome-install-btn" id="chromeInstallBtn">📲 安装到主屏幕</button>

    <!-- 安装弹窗 -->
    <div class="install-modal" id="installModal">
        <div class="install-card">
            <div class="icon">🎲</div>
            <h2>安装指尖随机</h2>
            <p>添加到主屏幕，随时快速启动</p>
            <div class="steps" id="installSteps">
                <!-- 动态内容 -->
            </div>
            <button class="install-btn" id="installBtn">安装应用</button>
            <button class="skip-btn" id="skipBtn">稍后再说</button>
        </div>
    </div>

    <script>
        // ==================== PWA 安装逻辑 ====================
        let deferredPrompt = null;
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                            window.navigator.standalone === true ||
                            document.referrer.startsWith('android-app://');

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.log('SW registration failed'));
        }

        // 捕获 beforeinstallprompt 事件
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('chromeInstallBtn').style.display = 'block';
        });

        // 显示安装弹窗
        function showInstallModal() {
            const modal = document.getElementById('installModal');
            const steps = document.getElementById('installSteps');

            if (isIOS) {
                steps.innerHTML = `
                    <ol>
                        <li>点击 Safari 底部的 <span class="highlight">分享按钮 ⬆️</span></li>
                        <li>在菜单中找到 <span class="highlight">"添加到主屏幕"</span></li>
                        <li>点击 <span class="highlight">"添加"</span> 完成安装</li>
                    </ol>
                `;
                document.getElementById('installBtn').textContent = '我知道了';
            } else if (deferredPrompt) {
                steps.innerHTML = `
                    <ol>
                        <li>点击下方的 <span class="highlight">"安装应用"</span> 按钮</li>
                        <li>在弹出的确认框中点击 <span class="highlight">"安装"</span></li>
                        <li>应用将出现在你的主屏幕上</li>
                    </ol>
                `;
                document.getElementById('installBtn').textContent = '安装应用';
            } else {
                steps.innerHTML = `
                    <ol>
                        <li>打开浏览器菜单（⋮ 或 ⋯）</li>
                        <li>选择 <span class="highlight">"添加到主屏幕"</span> 或 <span class="highlight">"安装应用"</span></li>
                        <li>按提示完成安装</li>
                    </ol>
                `;
                document.getElementById('installBtn').textContent = '我知道了';
            }

            modal.classList.add('show');
        }

        // 隐藏安装弹窗
        function hideInstallModal() {
            document.getElementById('installModal').classList.remove('show');
        }

        // 安装按钮点击
        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt && !isIOS) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    deferredPrompt = null;
                }
            }
            hideInstallModal();
            localStorage.setItem('installPromptDismissed', 'true');
        });

        // 跳过按钮
        document.getElementById('skipBtn').addEventListener('click', () => {
            hideInstallModal();
            localStorage.setItem('installPromptDismissed', 'true');
        });

        // 角标点击
        document.getElementById('installBadge').addEventListener('click', showInstallModal);

        // Chrome 安装按钮
        document.getElementById('chromeInstallBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('chromeInstallBtn').style.display = 'none';
                    deferredPrompt = null;
                }
            }
        });

        // 自动显示安装提示（首次访问且未安装）
        if (!isStandalone && !localStorage.getItem('installPromptDismissed')) {
            setTimeout(() => {
                showInstallModal();
            }, 2000);
        }

        // 已安装后显示角标（如果用户跳过了）
        if (!isStandalone && localStorage.getItem('installPromptDismissed')) {
            document.getElementById('installBadge').style.display = 'flex';
        }

        // ==================== 游戏逻辑 ====================
        class FingerGame {
            constructor() {
                this.touches = new Map();
                this.readyTouches = [];
                this.readyCount = 0;
                this.isSelecting = false;
                this.hasWinner = false;
                this.longPressTime = 1200;
                this.colorIndex = 0;

                this.colors = [
                    ['#FF6B6B', '#FFB4B4'],
                    ['#4ECDC4', '#A8E6E1'],
                    ['#45B7D1', '#A2D5F2'],
                    ['#96CEB4', '#C8E6C9'],
                    ['#FFEAA7', '#FFF3CD'],
                    ['#DDA0DD', '#E8C4E8'],
                    ['#FF8C94', '#FFC3C8'],
                    ['#87CEEB', '#B8E0F0'],
                    ['#98D8C8', '#C5E8DE'],
                    ['#F7DC6F', '#FAE8A0'],
                    ['#BB8FCE', '#D5B8E8'],
                    ['#85C1E9', '#B4D7F2'],
                ];

                this.hint = document.getElementById('hint');
                this.toast = document.getElementById('toast');

                this.init();
            }

            getNextColor() {
                const color = this.colors[this.colorIndex % this.colors.length];
                this.colorIndex++;
                return color;
            }

            init() {
                document.addEventListener('touchstart', (e) => this.onTouchStart(e), { passive: false });
                document.addEventListener('touchmove', (e) => this.onTouchMove(e), { passive: false });
                document.addEventListener('touchend', (e) => this.onTouchEnd(e));
                document.addEventListener('touchcancel', (e) => this.onTouchEnd(e));

                document.addEventListener('mousedown', (e) => this.onMouseDown(e));
                document.addEventListener('mousemove', (e) => this.onMouseMove(e));
                document.addEventListener('mouseup', (e) => this.onMouseUp(e));

                document.addEventListener('click', (e) => this.onClick(e));
                document.addEventListener('contextmenu', (e) => e.preventDefault());
            }

            createElements(x, y) {
                const [mainColor, glowColor] = this.getNextColor();

                const finger = document.createElement('div');
                finger.className = 'finger';
                finger.style.left = x + 'px';
                finger.style.top = y + 'px';
                finger.style.background = `radial-gradient(circle, ${mainColor} 0%, ${glowColor}88 35%, ${glowColor}33 55%, transparent 70%)`;
                finger.style.boxShadow = `0 0 20px ${mainColor}66, 0 0 40px ${mainColor}33`;
                finger.style.color = mainColor;
                document.body.appendChild(finger);

                const ring = document.createElement('div');
                ring.className = 'ring';
                ring.style.left = x + 'px';
                ring.style.top = y + 'px';
                ring.innerHTML = `
                    <svg viewBox="0 0 80 80">
                        <circle cx="40" cy="40" r="36" stroke="${mainColor}"/>
                    </svg>
                `;
                document.body.appendChild(ring);

                const circle = ring.querySelector('circle');

                requestAnimationFrame(() => {
                    circle.style.transition = `stroke-dashoffset ${this.longPressTime}ms linear`;
                    circle.style.strokeDashoffset = '0';
                });

                return { finger, ring, circle, mainColor, glowColor };
            }

            onTouchStart(e) {
                if (this.isSelecting || this.hasWinner) return;
                e.preventDefault();

                for (let touch of e.changedTouches) {
                    if (this.touches.has(touch.identifier)) continue;

                    const elements = this.createElements(touch.clientX, touch.clientY);

                    const data = {
                        id: touch.identifier,
                        x: touch.clientX,
                        y: touch.clientY,
                        ...elements,
                        ready: false,
                        timer: setTimeout(() => {
                            this.confirmTouch(touch.identifier);
                        }, this.longPressTime)
                    };

                    this.touches.set(touch.identifier, data);
                }

                this.updateHint();
            }

            onTouchMove(e) {
                if (this.isSelecting || this.hasWinner) return;
                e.preventDefault();

                for (let touch of e.changedTouches) {
                    const data = this.touches.get(touch.identifier);
                    if (!data || data.ready) continue;

                    data.x = touch.clientX;
                    data.y = touch.clientY;
                    data.finger.style.left = touch.clientX + 'px';
                    data.finger.style.top = touch.clientY + 'px';
                    data.ring.style.left = touch.clientX + 'px';
                    data.ring.style.top = touch.clientY + 'px';
                }
            }

            onTouchEnd(e) {
                if (this.isSelecting || this.hasWinner) return;

                for (let touch of e.changedTouches) {
                    this.removeTouch(touch.identifier);
                }
                this.updateHint();
            }

            mouseId = 'mouse';
            onMouseDown(e) {
                if (this.isSelecting || this.hasWinner) return;
                if (this.touches.has(this.mouseId)) return;

                const elements = this.createElements(e.clientX, e.clientY);

                const data = {
                    id: this.mouseId,
                    x: e.clientX,
                    y: e.clientY,
                    ...elements,
                    ready: false,
                    timer: setTimeout(() => this.confirmTouch(this.mouseId), this.longPressTime)
                };

                this.touches.set(this.mouseId, data);
                this.updateHint();
            }

            onMouseMove(e) {
                if (this.isSelecting || this.hasWinner) return;
                const data = this.touches.get(this.mouseId);
                if (!data || data.ready) return;

                data.x = e.clientX;
                data.y = e.clientY;
                data.finger.style.left = e.clientX + 'px';
                data.finger.style.top = e.clientY + 'px';
                data.ring.style.left = e.clientX + 'px';
                data.ring.style.top = e.clientY + 'px';
            }

            onMouseUp(e) {
                if (this.isSelecting || this.hasWinner) return;
                this.removeTouch(this.mouseId);
                this.updateHint();
            }

            confirmTouch(id) {
                const data = this.touches.get(id);
                if (!data || data.ready) return;

                data.ready = true;
                data.finger.classList.add('ready');
                data.ring.classList.add('ready');
                data.finger.style.boxShadow = `0 0 30px ${data.mainColor}, 0 0 60px ${data.mainColor}88`;

                this.readyCount++;

                if (navigator.vibrate) navigator.vibrate(50);

                this.showToast(`已确认 ${this.readyCount} 人`);

                if (this.readyCount >= 2 && this.readyCount === this.touches.size) {
                    setTimeout(() => this.startSelection(), 500);
                }
            }

            removeTouch(id) {
                const data = this.touches.get(id);
                if (!data) return;

                if (data.timer) clearTimeout(data.timer);
                if (data.ready) this.readyCount--;

                data.finger.remove();
                data.ring.remove();
                this.touches.delete(id);
            }

            startSelection() {
                this.isSelecting = true;

                this.readyTouches = Array.from(this.touches.values())
                    .filter(t => t.ready)
                    .map(t => ({...t}));

                this.showToast('🎲 随机选择中...');

                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

                let idx = 0;
                let speed = 60;
                let rounds = 0;
                const winnerIdx = Math.floor(Math.random() * this.readyTouches.length);

                const roulette = document.createElement('div');
                roulette.className = 'roulette-glow';
                document.body.appendChild(roulette);

                const animate = () => {
                    const current = this.readyTouches[idx];

                    roulette.style.left = current.x + 'px';
                    roulette.style.top = current.y + 'px';
                    roulette.style.border = `3px solid ${current.mainColor}`;
                    roulette.style.boxShadow = `0 0 40px ${current.mainColor}66, inset 0 0 30px ${current.mainColor}33`;
                    roulette.classList.remove('active');
                    void roulette.offsetWidth;
                    roulette.classList.add('active');

                    this.readyTouches.forEach((t, i) => {
                        if (i === idx) {
                            t.finger.style.transform = 'translate(-50%, -50%) scale(1.4)';
                            t.finger.style.filter = 'brightness(1.3)';
                        } else {
                            t.finger.style.transform = 'translate(-50%, -50%) scale(1)';
                            t.finger.style.filter = 'brightness(1)';
                        }
                    });

                    idx = (idx + 1) % this.readyTouches.length;
                    if (idx === 0) rounds++;

                    if (rounds >= 3) speed += 30;

                    if (rounds >= 4 && idx === winnerIdx && speed > 300) {
                        setTimeout(() => this.showWinner(this.readyTouches[winnerIdx], roulette), speed);
                        return;
                    }

                    setTimeout(animate, speed);
                };

                animate();
            }

            showWinner(winnerData, rouletteEl) {
                this.hasWinner = true;

                this.touches.forEach((data) => {
                    if (data.id !== winnerData.id) {
                        data.finger.classList.add('fade');
                        data.ring.classList.add('fade');
                        setTimeout(() => {
                            data.finger.remove();
                            data.ring.remove();
                        }, 500);
                    }
                });

                rouletteEl.remove();

                const aura = document.createElement('div');
                aura.className = 'winner-aura';
                aura.style.left = winnerData.x + 'px';
                aura.style.top = winnerData.y + 'px';
                aura.style.background = `radial-gradient(circle, ${winnerData.mainColor}44 0%, transparent 70%)`;
                document.body.appendChild(aura);
                winnerData.aura = aura;

                winnerData.finger.classList.remove('ready');
                winnerData.finger.classList.add('winner');
                winnerData.finger.style.background = `radial-gradient(circle, #FFD700 0%, #FFA500 30%, #FF8C00 50%, transparent 70%)`;
                winnerData.finger.style.boxShadow = `
                    0 0 30px #FFD700, 
                    0 0 60px #FFA500, 
                    0 0 100px #FF8C0088,
                    0 0 150px #FF8C0044
                `;
                winnerData.finger.style.color = '#FFD700';
                winnerData.ring.remove();

                this.createParticles(winnerData.x, winnerData.y, winnerData.mainColor);

                this.showToast('🎉 点击任意位置继续');

                if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
            }

            createParticles(x, y, baseColor) {
                const colors = ['#FFD700', '#FFA500', '#FF8C00', '#FFE4B5', baseColor];
                for (let i = 0; i < 20; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = x + 'px';
                    p.style.top = y + 'px';
                    p.style.background = colors[i % colors.length];
                    p.style.boxShadow = `0 0 6px ${colors[i % colors.length]}`;
                    const angle = (Math.PI * 2 * i) / 20 + (Math.random() - 0.5) * 0.3;
                    const dist = 40 + Math.random() * 100;
                    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                    p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 1000);
                }
            }

            onClick(e) {
                if (!this.hasWinner) return;
                this.reset();
            }

            reset() {
                this.touches.forEach(data => {
                    data.finger.remove();
                    if (data.ring.parentNode) data.ring.remove();
                    if (data.aura) data.aura.remove();
                });
                this.touches.clear();
                this.readyTouches = [];

                document.querySelectorAll('.particle, .roulette-glow, .winner-aura').forEach(el => el.remove());

                this.readyCount = 0;
                this.isSelecting = false;
                this.hasWinner = false;

                this.hint.classList.remove('hidden');
                this.toast.classList.remove('show');
            }

            updateHint() {
                if (this.touches.size > 0) {
                    this.hint.classList.add('hidden');
                } else {
                    this.hint.classList.remove('hidden');
                }
            }

            showToast(msg) {
                this.toast.textContent = msg;
                this.toast.classList.add('show');
                clearTimeout(this.toastTimer);
                this.toastTimer = setTimeout(() => {
                    if (!this.hasWinner) this.toast.classList.remove('show');
                }, 2000);
            }
        }

        const game = new FingerGame();
    </script>
</body>
</html>
